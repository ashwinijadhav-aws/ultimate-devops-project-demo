apiVersion: argoproj.io/v1alpha1 # ArgoCD Application resource
kind: Application               # Kind of resource
metadata:                        # Metadata section                         
  name: orderbird-springboot-app        # App name
  namespace: argocd          # Must exist in ArgoCD namespace -ArgoCD only watches the argocd namespace by default.
spec:
  project: default        # Assigns app to the frontend-team Project
  source:
    repoURL: https://github.com/ashwinijadhav-aws/ORDERBIRD_K8S_MANIFEST_REPO.git  # Git repo
    targetRevision: main        # Branch to watch
    path: SPRING-BOOT-APP-MANIFEST    # Path in repo with manifests
  destination:
    server: https://kubernetes.default.svc # Target cluster, run `argocd cluster list` to see
    namespace: default          # Namespace inside that cluster
  syncPolicy:                    # Sync policy settings
    automated:                   # Enable automated sync
      prune: true                 # Delete resources removed from Git
      selfHeal: true              # Correct drift if resources change in cluster
    syncOptions:                 # Additional sync options
      - CreateNamespace=false      # Auto-create namespace if it doesn't exist