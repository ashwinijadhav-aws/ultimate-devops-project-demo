apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-shop-app        # Child app name
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  namespace: argocd          # Must exist in ArgoCD namespace -ArgoCD only watches the argocd namespace by default.
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # Sync order, lower numbers sync first
spec:
  project: opentelemetry-project  
  source:
    repoURL: https://github.com/ashwinijadhav-aws/argocd-demos.git # Repo containing child apps(that you have forked and cloned earlier)
    targetRevision: main
    path: declarative_approach/online_shop  # path of Online Shop app in `argocd-demos` repo
  destination:
    server: https://172.31.6.84:33893 # Replace with your Cluster Url, To get run: `argocd cluster list`
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
